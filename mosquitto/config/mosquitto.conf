# Configuración del Broker MQTT - Eclipse Mosquitto
# Sistema C5 - Alerta Ciudadana

# --- Listener ---
listener 1883
protocol mqtt

# --- Acceso anónimo (para desarrollo/demo) ---
allow_anonymous true

# --- Persistencia ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# --- WebSocket Listener (opcional, para clientes web) ---
listener 9001
protocol websockets
allow_anonymous true
